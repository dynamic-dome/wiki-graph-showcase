<!DOCTYPE html>
<html lang="de" data-theme="crab">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Knowledge Nebula — Dynamic Dome</title>
<meta name="description" content="Interaktiver 3D-Wissensgraph: Kompetenz-Graph zu Agentic Engineering als Einstieg, dazu ein kuratierter Astrophysik-Nebel.">
<link rel="canonical" href="https://wiki.dynamic-dome.com/">
<meta property="og:title" content="Knowledge Nebula — Dynamic Dome">
<meta property="og:description" content="Kompetenz-Graph und Astrophysik-Nebel zum Rumklicken.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wiki.dynamic-dome.com/">
<meta property="og:image" content="https://wiki.dynamic-dome.com/assets/vendor/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Knowledge Nebula — ein 3D-Wissensgraph aus Astrophysik-Konzepten">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Knowledge Nebula — Dynamic Dome">
<meta name="twitter:description" content="Kompetenz-Graph und Astrophysik-Nebel zum Rumklicken.">
<meta name="twitter:image" content="https://wiki.dynamic-dome.com/assets/vendor/og-image.jpg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "https://wiki.dynamic-dome.com/#webpage",
  "url": "https://wiki.dynamic-dome.com/",
  "name": "Knowledge Nebula — Dynamic Dome",
  "description": "Interaktiver 3D-Wissensgraph — Kompetenz-Graph und Astrophysik-Datensatz.",
  "inLanguage": "de-DE",
  "author": {
    "@type": "Person",
    "@id": "https://dynamic-dome.com/#person",
    "name": "Dominic Meiser",
    "url": "https://dynamic-dome.com/profil/",
    "jobTitle": "Agentic AI Engineer"
  }
}
</script>
<link rel="preload" href="assets/graph.json" as="fetch" crossorigin>
<link rel="stylesheet" href="assets/styles/base.css">
<link rel="stylesheet" href="assets/styles/theme-crab.css">
<link rel="stylesheet" href="assets/styles/theme-dome.css">
<link rel="stylesheet" href="assets/styles/competence.css">
</head>
<body>
  <div class="intro-overlay" id="intro-overlay" aria-hidden="true">
    <div class="intro-inner">
      <div class="intro-eyebrow">First Light</div>
      <h1 class="intro-title">Knowledge Nebula</h1>
      <div class="intro-telemetry" id="intro-telemetry"></div>
    </div>
  </div>

  <header class="topbar">
    <a class="parent-link" href="https://dynamic-dome.com/" rel="noopener" aria-label="Zurueck zu dynamic-dome.com">
      <span class="parent-link-arrow" aria-hidden="true">&larr;</span>
      <span class="parent-link-text">dynamic-dome.com</span>
    </a>
    <div class="brand">
      <span class="brand-glyph" id="brand-glyph">&#x25C6;</span>
      <span class="brand-name" id="brand-name">Knowledge Nebula</span>
    </div>
    <div class="topbar-right">
      <div class="dataset-switch" id="dataset-switch" role="tablist" aria-label="Datensatz waehlen">
        <button class="dataset-btn" id="dataset-astro" data-dataset="astro" role="tab" aria-selected="false">Nebula</button>
        <button class="dataset-btn" id="dataset-kompetenz" data-dataset="kompetenz" role="tab" aria-selected="true">Kompetenz</button>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Theme umschalten">
        <span class="theme-label">Theme</span>
        <span class="theme-current" id="theme-current">crab</span>
      </button>
      <div class="meta-readout" id="meta-readout">— Knoten · — Kanten</div>
    </div>
  </header>

  <main class="stage" id="stage" aria-label="3D Wissensgraph">
    <div class="search-box" id="search-box">
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Knoten suchen…"
        autocomplete="off"
        aria-label="Knoten suchen"
      >
      <ul class="search-results" id="search-results" role="listbox" hidden></ul>
    </div>
    <div class="graph-container" id="graph-container"></div>
    <div class="label-layer" id="label-layer" aria-hidden="true"></div>
    <canvas class="sparkles-layer" id="sparkles-layer" aria-hidden="true"></canvas>
    <div class="cmb-layer" id="cmb-layer" aria-hidden="true"></div>
    <div class="reticle" id="reticle" aria-hidden="true"><div class="reticle-ring"></div></div>
    <div class="tooltip" id="tooltip" role="status" aria-live="polite"></div>
    <div class="legend" id="legend">
      <div class="legend-body" id="legend-body" hidden></div>
      <button class="legend-toggle" id="legend-toggle" type="button" aria-expanded="false" aria-controls="legend-body">
        <span class="legend-glyph" aria-hidden="true">&#x25C6;</span> Legende
      </button>
    </div>
    <div class="status-bar" id="status-bar" aria-live="polite"></div>
  </main>

  <div class="plate-hint" id="plate-hint" aria-hidden="true"></div>

  <aside class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" inert>
    <button class="modal-close" id="modal-close" aria-label="Schliessen">&times;</button>
    <div class="modal-badges" id="modal-badges"></div>
    <h2 class="modal-title" id="modal-title"></h2>
    <p class="modal-subtitle" id="modal-subtitle"></p>
    <p class="modal-essence" id="modal-essence"></p>
    <div class="modal-neighbours">
      <span class="modal-section-label">Verbunden mit</span>
      <div class="neighbour-pills" id="neighbour-pills"></div>
    </div>
    <p class="modal-hint">Doppelklick auf den Knoten oeffnet ihn als neues Zentrum.</p>
  </aside>

  <footer class="control-panel">
    <label class="ctrl-label" for="gold-slider">
      <span class="ctrl-glyph">&#x25C6;</span> Gold-Mode
    </label>
    <input
      type="range"
      min="0"
      max="100"
      step="1"
      value="35"
      class="gold-slider"
      id="gold-slider"
      aria-label="Gold-Mode Intensitaet"
    >
    <span class="ctrl-value" id="gold-value">35%</span>
    <button class="tour-btn" id="tour-btn" type="button" aria-label="Auto-Tour starten">
      <span class="tour-glyph">&#x25B6;</span> Tour
    </button>
    <nav class="ctrl-legal" aria-label="Rechtliches">
      <a href="https://dynamic-dome.com/impressum/" rel="noopener">Impressum</a>
      <a href="https://dynamic-dome.com/datenschutz/" rel="noopener">Datenschutz</a>
    </nav>
  </footer>

  <script src="assets/vendor/3d-force-graph.min.js"></script>
  <script type="module" src="assets/scripts/main.js"></script>
</body>
</html>
